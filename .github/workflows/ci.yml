name: CI

on:
  push:
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    env:
      ANONYMIZED_TELEMETRY: "False"
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"

      - name: Sync deps (locked)
        run: uv sync --locked

      - name: Ruff
        run: uv run ruff check .

      - name: Pytest
        run: uv run pytest
